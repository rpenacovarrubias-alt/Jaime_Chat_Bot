<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jaime — Constructor de Contexto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary:      #1E3A5F;
  --primary-dark: #0F172A;
  --accent:       #F97316;
  --sky:          #4EA8DE;
  --text:   #1C1C1E;
  --muted:  #9CA3AF;
  --bg:     #FFF8F2;
  --card:   #FDF2E4;
  --border: #E5E7EB;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); }
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; vertical-align:middle; }
.wrapper { display: flex; min-height: 100vh; max-width: 1300px; margin: 0 auto; background: var(--card); box-shadow: 0 4px 20px rgba(0,0,0,.08); }
.main { flex: 1; padding: 50px 60px; overflow-y: auto; }
.lbl { display: block; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 7px; color: var(--muted); font-weight: 500; }
select, textarea, input[type=text] {
  width: 100%; padding: 11px 13px; font-size: 14px;
  border-radius: 8px; border: 1px solid var(--border);
  background: #FAFAFA; color: var(--text);
  transition: all .2s; font-family: "Inter", sans-serif;
}
select:focus, textarea:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(249,115,22,.10); }
textarea { resize: vertical; min-height: 420px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
.fg { margin-bottom: 20px; }
.card-box { border: 1px solid var(--border); border-radius: 12px; padding: 24px; background: #fff; margin-bottom: 24px; }
.btn {
  padding: 12px 22px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: all .2s; display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #DC5F0C; }
.btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: rgba(30,58,95,.06); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 10px; border-radius: 20px; font-weight: 500; }
.badge-ok { background: #DCFCE7; color: #15803D; }
.badge-pending { background: #FEF3C7; color: #92400E; }
#statusMsg { font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="main">

    <div style="margin-bottom:30px;">
      <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:700;margin:0 0 6px;color:#0F172A;">Constructor de Contexto</h1>
      <p style="color:var(--muted);font-size:13px;margin:0;">Genera el contexto ManyChat de un hotel a partir de su Data Onboarding ya guardado.</p>
    </div>

    <div class="card-box">
      <div class="fg">
        <label class="lbl">Selecciona el hotel</label>
        <select id="selHotel"></select>
      </div>

      <div id="hotelStatus" style="margin-bottom:18px;"></div>

      <button type="button" class="btn btn-accent" id="btnConstruir">
        <i class="fas fa-hammer"></i> Construir
      </button>
      <button type="button" class="btn btn-outline" id="btnDescargar" style="margin-left:8px;" disabled>
        <i class="fas fa-file-pdf"></i> Descargar .PDF
      </button>

      <div id="statusMsg"></div>
    </div>

    <div class="card-box" id="editorBox" style="display:none;">
      <div class="fg" style="display:flex;align-items:center;justify-content:space-between;">
        <label class="lbl" style="margin:0;">Ver / Editar Contexto</label>
        <button type="button" class="btn btn-primary" id="btnGuardarEdicion" style="padding:8px 16px;font-size:12px;">
          <i class="fas fa-save"></i> Guardar cambios
        </button>
      </div>
      <textarea id="txtContexto" placeholder="Aun no se ha construido el contexto de este hotel. Presiona Construir."></textarea>
    </div>

  </div>
</div>

<script src="/assets/js/shared.js"></script>
<script>
(function () {
  var selHotel   = document.getElementById('selHotel');
  var hotelStatus= document.getElementById('hotelStatus');
  var btnConstruir = document.getElementById('btnConstruir');
  var btnDescargar = document.getElementById('btnDescargar');
  var btnGuardarEdicion = document.getElementById('btnGuardarEdicion');
  var editorBox  = document.getElementById('editorBox');
  var txtContexto= document.getElementById('txtContexto');
  var statusMsg  = document.getElementById('statusMsg');

  function fechaLegible(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('es-MX', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso; }
  }

  function poblarSelect() {
    var hotels = window.JaimeHotelData.getDynamicHotels();
    selHotel.innerHTML = '';
    if (!hotels.length) {
      var opt = document.createElement('option');
      opt.textContent = 'No hay hoteles guardados todavia';
      opt.value = '';
      selHotel.appendChild(opt);
      return [];
    }
    hotels.forEach(function (h) {
      var opt = document.createElement('option');
      opt.value = h.id;
      opt.textContent = h.nombre;
      selHotel.appendChild(opt);
    });
    return hotels;
  }

  function refrescarVista(hotelId) {
    var hotel = window.JaimeHotelData.getHotelById(hotelId);
    if (!hotel) {
      hotelStatus.innerHTML = '';
      editorBox.style.display = 'none';
      btnDescargar.disabled = true;
      return;
    }
    if (hotel.contexto) {
      hotelStatus.innerHTML = '<span class="badge badge-ok"><i class="fas fa-check-circle"></i> Contexto construido — ' + fechaLegible(hotel.contextoFecha) + '</span>';
      editorBox.style.display = 'block';
      txtContexto.value = hotel.contexto;
      btnDescargar.disabled = false;
    } else {
      hotelStatus.innerHTML = '<span class="badge badge-pending"><i class="fas fa-circle-exclamation"></i> Aun no se ha construido el contexto de este hotel</span>';
      editorBox.style.display = 'none';
      txtContexto.value = '';
      btnDescargar.disabled = true;
    }
  }

  btnConstruir.addEventListener('click', function () {
    var hotelId = selHotel.value;
    if (!hotelId) { alert('Selecciona un hotel primero.'); return; }
    btnConstruir.disabled = true;
    statusMsg.textContent = 'Construyendo contexto...';
    statusMsg.style.color = 'var(--muted)';
    window.JaimeHotelData.construirYGuardarContexto(hotelId, function (err, r) {
      btnConstruir.disabled = false;
      if (err) {
        statusMsg.textContent = 'Error: ' + err.message;
        statusMsg.style.color = '#DC2626';
        return;
      }
      statusMsg.textContent = 'Contexto construido y descargado correctamente.';
      statusMsg.style.color = '#15803D';
      refrescarVista(hotelId);
    });
  });

  btnDescargar.addEventListener('click', function () {
    var hotelId = selHotel.value;
    var hotel = window.JaimeHotelData.getHotelById(hotelId);
    if (!hotel || !hotel.contexto) return;
    window.JaimeHotelData.ensureJsPDF(function () {
      var r = window.JaimeHotelData.renderTextoPDF(hotel.contexto, hotel.nombre);
      r.doc.save(r.filename);
    });
  });

  btnGuardarEdicion.addEventListener('click', function () {
    var hotelId = selHotel.value;
    if (!hotelId) return;
    window.JaimeHotelData.updateHotel(hotelId, { contexto: txtContexto.value, contextoFecha: new Date().toISOString() });
    statusMsg.textContent = 'Cambios guardados.';
    statusMsg.style.color = '#15803D';
    refrescarVista(hotelId);
  });

  selHotel.addEventListener('change', function () {
    refrescarVista(selHotel.value);
    var url = new URL(window.location.href);
    url.searchParams.set('hotel_id', selHotel.value);
    history.replaceState(null, '', url);
  });

  function init() {
    var hotels = poblarSelect();
    if (!hotels.length) return;
    var params = new URLSearchParams(window.location.search);
    var preselect = params.get('hotel_id');
    if (preselect && hotels.some(function (h) { return h.id === preselect; })) {
      selHotel.value = preselect;
    }
    refrescarVista(selHotel.value);
  }

  if (window.JaimeHotelData) { init(); }
  else { document.addEventListener('DOMContentLoaded', init); setTimeout(init, 200); }
})();
</script>
</body>
</html>
